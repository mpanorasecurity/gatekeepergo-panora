<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GatekeeperGo</title>
<link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#FFFFFF;
    --bg-card:#FFFFFF;
    --border:#D3D1C7;
    --border-soft:#E3E1D8;
    --text-primary:#2C2C2A;
    --text-secondary:#5F5E5A;
    --text-tertiary:#888780;
    --radius-md:8px;
    --radius-lg:12px;

    --vacant-50:#EDEBE4; --vacant-600:#888780; --vacant-800:#444441; --vacant-900:#2C2C2A;
    --vp-50:#FFF9D6; --vp-600:#C9A400; --vp-800:#705C00; --vp-900:#473A00;
    --reno-50:#E1EEFD; --reno-600:#1768D1; --reno-800:#0D4A99; --reno-900:#082F61;
    --movein-50:#E1F5EE; --movein-600:#0F6E56; --movein-800:#085041; --movein-900:#04342C;
    --danger-50:#FCEBEB; --danger-600:#A32D2D; --danger-800:#791F1F; --danger-900:#501313;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-page);
    color:var(--text-primary);
  }
  .app{max-width:1280px;margin:0 auto;padding:24px 20px 60px;}

  .header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .masthead{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:36px;font-weight:700;letter-spacing:0.02em;color:var(--text-primary);
    margin-bottom:20px;font-family:'Cormorant Garamond',Georgia,serif;
    flex-wrap:wrap;
  }
  .masthead-left{display:flex;align-items:center;gap:10px;}
  .masthead-right{display:flex;gap:8px;align-items:center;}
  .app-title{font-size:36px;font-weight:700;font-family:'Cormorant Garamond',Georgia,serif;line-height:1;}
  .app-sub{font-size:14px;color:var(--text-secondary);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-weight:400;}
  .header h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  .header p{font-size:13px;color:var(--text-secondary);margin:0;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{
    padding:10px 20px;border:1px solid #000000;border-radius:var(--radius-lg);background:var(--bg-card);
    font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);
  }
  .tab-btn.active{color:var(--bg-card);background:var(--text-primary);border-color:var(--text-primary);}
  .tab-btn.admin-tab-btn{margin-left:auto;background:var(--bg-card);color:var(--text-secondary);}
  .tab-btn.admin-tab-btn.admin-active{background:var(--movein-50);border-color:var(--movein-600);color:var(--movein-800);}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stats.stats-5{grid-template-columns:repeat(5,1fr);}
  .stat-card{background:var(--bg-card);border:1px solid #000000;border-radius:var(--radius-lg);padding:12px 14px;}
  .stat-card.stat-vacant{background:var(--vacant-50);border:1px solid #000000;}
  .stat-card.stat-vacant .stat-num{color:var(--vacant-900);}
  .stat-card.stat-vp{background:var(--vp-50);border:1px solid var(--vp-600);}
  .stat-card.stat-vp .stat-num{color:var(--vp-900);}
  .stat-card.stat-renovation{background:var(--reno-50);border:1px solid var(--reno-600);}
  .stat-card.stat-renovation .stat-num{color:var(--reno-900);}
  .stat-card.stat-movein{background:var(--movein-50);border:1px solid #22C55E;}
  .stat-card.stat-movein .stat-num{color:var(--movein-900);}
  .stat-num{font-size:22px;font-weight:600;line-height:1.2;}
  .stat-label{font-size:11px;color:var(--text-secondary);margin-top:2px;line-height:1.3;}

  .alert-banner{
    display:none;
    background:var(--danger-50);border:1px solid var(--danger-600);border-radius:var(--radius-lg);
    padding:10px 14px;margin-bottom:16px;color:var(--danger-900);font-size:13px;
    align-items:flex-start;gap:8px;
  }
  .alert-banner.show{display:flex;}
  .alert-banner b{color:var(--danger-900);}
  .alert-banner.expired-banner{background:#FDF0F0;border-color:#E68A8A;color:#8C2E2E;}
  .alert-banner.expired-banner b{color:#8C2E2E;}

  .search-row{margin-bottom:12px;}
  .search-row input[type=text]{
    width:100%;padding:12px 14px;border:1px solid #000000;border-radius:var(--radius-md);
    font-size:16px;font-weight:500;background:var(--bg-card);color:var(--text-primary);
  }
  .filter-btn{
    padding:7px 12px;border:1px solid #000000;border-radius:999px;background:var(--bg-card);
    font-size:12px;cursor:pointer;color:var(--text-secondary);white-space:nowrap;
  }
  .filter-btn.active{border-color:var(--text-primary);color:var(--text-primary);font-weight:600;background:var(--border-soft);}
  .filter-btn .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}

  .filter-group{
    border:1px solid #000000;border-radius:var(--radius-lg);padding:10px 12px;background:var(--bg-card);margin-bottom:14px;
  }
  .filter-group-title{font-size:11px;font-weight:700;letter-spacing:0.04em;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;}
  .filter-group-pills{display:flex;gap:8px;flex-wrap:wrap;}

  .setup-btn{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);font-size:12px;cursor:pointer;color:var(--text-secondary);}
  .setup-btn.admin-active{border-color:#0F6E56;background:#E1F5EE;color:#085041;font-weight:600;}

  .street-group{
    border:1px solid #000000;border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;background:#FAFAF8;
  }
  .street-group-header{
    font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:10px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .street-group-count{font-size:11px;font-weight:400;color:var(--text-tertiary);}
  .street-group-breakdown{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;font-weight:500;color:var(--text-secondary);}
  .sgb-item{display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
  .sgb-dot{display:inline-block;width:7px;height:7px;border-radius:50%;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;
  }
  .unit-card{
    border-radius:var(--radius-md);padding:10px 10px 8px;cursor:pointer;border:1px solid transparent;
    transition:transform 0.06s ease;position:relative;text-align:center;
  }
  .unit-card:hover{transform:translateY(-1px);}
  .unit-card .uphase{font-size:9px;font-weight:600;letter-spacing:0.04em;margin:0 0 3px;opacity:0.6;text-transform:uppercase;}
  .unit-card .uno{font-size:14px;font-weight:500;margin:0 0 4px;opacity:0.85;}
  .unit-card .uaddr{font-size:13px;font-weight:600;margin:0 0 2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .unit-card .ustatus{font-size:11px;font-weight:500;}
  .unit-card .uflag{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger-600);}
  .unit-card .uflag.expired{background:#E68A8A;right:16px;}

  .unit-card.vacant{background:var(--vacant-50);border:1px solid #000000;}
  .unit-card.vacant .uno{color:var(--vacant-900);}
  .unit-card.vacant .ustatus{color:var(--vacant-800);}

  .unit-card.vp{background:var(--vp-50);border:1px solid var(--vp-600);}
  .unit-card.vp .uno{color:var(--vp-900);}
  .unit-card.vp .ustatus{color:var(--vp-800);}

  .unit-card.renovation{background:var(--reno-50);border:1px solid var(--reno-600);}
  .unit-card.renovation .uno{color:var(--reno-900);}
  .unit-card.renovation .ustatus{color:var(--reno-800);}

  .unit-card.movein{background:var(--movein-50);border:1px solid #22C55E;}
  .unit-card.movein .uno{color:var(--movein-900);}
  .unit-card.movein .ustatus{color:var(--movein-800);}

  .unit-card.expired-permit{border:2px solid #C94343;background:#FDEAEA;}
  .unit-card.expired-permit .uno{color:#7A2424;}
  .unit-card.expired-permit .ustatus{color:#962E2E;}

  .empty{
    text-align:center;padding:50px 20px;color:var(--text-tertiary);font-size:13px;
  }

  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;position:relative;
  }
  .modal h2{font-size:16px;font-weight:600;margin:0 0 14px;}
  .modal label{display:block;font-size:12px;color:var(--text-secondary);margin:12px 0 4px;}
  .modal select, .modal input[type=text], .modal textarea{
    width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;
    background:var(--bg-card);color:var(--text-primary);font-family:inherit;resize:vertical;
  }
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .btn{
    flex:1;padding:9px 12px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;border:1px solid var(--border);
    background:var(--bg-card);color:var(--text-primary);font-weight:500;
  }
  .btn.primary{background:var(--text-primary);color:var(--bg-card);border-color:var(--text-primary);}
  .btn.danger-text{color:var(--danger-600);}
  .close-x{position:absolute;top:14px;right:16px;cursor:pointer;color:var(--text-tertiary);font-size:18px;background:none;border:none;}

  .history-item{padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:12px;}
  .history-item:last-child{border-bottom:none;}
  .history-item .h-status{font-weight:600;}
  .history-item .h-meta{color:var(--text-tertiary);margin-top:2px;}

  .inhouse-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .inhouse-row input{flex:1;}
  .inhouse-row button{border:none;background:none;color:var(--danger-600);cursor:pointer;font-size:12px;padding:4px 8px;}

  .loading{text-align:center;padding:60px;color:var(--text-tertiary);font-size:13px;}

  @media (max-width:520px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .stats .stat-card:first-child{grid-column:1 / -1;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  }
</style>

const PHASE_KEYS = Object.keys(PHASES);
const INHOUSE_KEY = "inhouse-list-v1";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdOGOrUYl6_r7AuzlLISsVoVOZARw-3KjyaREDWP8LKjLZVIX5i2fVzDWq9exCtDn24w/exec";

async function scriptGet(sheet, key) {
  const url = `${SCRIPT_URL}?action=get&sheet=${encodeURIComponent(sheet)}`;
  const res = await fetch(url);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json.data && json.data[key] !== undefined ? json.data[key] : null;
}

async function scriptSet(sheet, key, value) {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "set", sheet: sheet, key: key, value: value })
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json.success === true;
}

let state = {
  activeTab: "all",
  units: {},
  inhouseList: [],
  filter: "all",
  search: "",
  isAdmin: false
};

const ADMIN_PASSWORD = "admin123";

function unitList(phaseKey) {
  const total = PHASES[phaseKey].total;
  const nums = [];
  for (let i = 1; i <= total; i++) nums.push(String(i).padStart(3, "0"));
  return nums;
}

function defaultUnitData() {
  return { status: "vacant", updatedBy: "", updatedAt: "", permitExpiry: "", renovationNote: "", history: [] };
}

async function loadData() {
  const phasePromise = Promise.all(PHASE_KEYS.map(async (phaseKey) => {
    try {
      const value = await scriptGet(phaseKey, "units");
      return { phaseKey, data: value ? JSON.parse(value) : {} };
    } catch (e) {
      console.error("Load failed for", phaseKey, e);
      return { phaseKey, data: {} };
    }
  }));

  const inhousePromise = (async () => {
    try {
      const value = await scriptGet("inhouse", "list");
      return value ? JSON.parse(value) : [];
    } catch (e) {
      console.error("Load failed for inhouse list", e);
      return [];
    }
  })();

  const [phaseResults, inhouseList] = await Promise.all([phasePromise, inhousePromise]);

  phaseResults.forEach(({ phaseKey, data }) => {
    state.units[phaseKey] = data;
    unitList(phaseKey).forEach(no => {
      if (!state.units[phaseKey][no]) state.units[phaseKey][no] = defaultUnitData();
    });
  });

  state.inhouseList = inhouseList;
}

async function saveUnits(phaseKey, retries = 1) {
  try {
    const ok = await scriptSet(phaseKey, "units", JSON.stringify(state.units[phaseKey]));
    if (!ok) throw new Error("Script returned no success");
    return true;
  } catch (e) {
    console.error("Save failed", e);
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 600));
      return saveUnits(phaseKey, retries - 1);
    }
    alert("Could not save this change. The server may be temporarily unavailable — please wait a few seconds and try again. If this keeps happening, let your administrator know.");
    return false;
  }
}

async function saveInhouse(retries = 1) {
  try {
    const ok = await scriptSet("inhouse", "list", JSON.stringify(state.inhouseList));
    if (!ok) throw new Error("Script returned no success");
    return true;
  } catch (e) {
    console.error("Save failed", e);
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 600));
      return saveInhouse(retries - 1);
    }
    alert("Could not save the in-house list. Please try again in a moment.");
    return false;
  }
}

function isMismatch(phaseKey, unitNo) {
  const u = state.units[phaseKey][unitNo];
  return u.status === "renovation" && !(u.history || []).some(h => h.status === "vp");
}

function isExpiredPermit(phaseKey, unitNo) {
  const u = state.units[phaseKey][unitNo];
  if (u.status !== "renovation" || !u.permitExpiry) return false;
  const today = new Date().toISOString().slice(0, 10);
  return u.permitExpiry < today;
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) + " " +
         d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}

function formatPermitDate(dateStr) {
  if (!dateStr) return "";
  const parts = dateStr.split("-");
  if (parts.length !== 3) return dateStr;
  const [yyyy, mm, dd] = parts;
  return `${dd}.${mm}.${yyyy.slice(2)}`;
}

function computeCounts(phaseKey) {
  const units = unitList(phaseKey);
  const counts = { vacant: 0, vp: 0, renovation: 0, movein: 0 };
  let mismatchCount = 0, expiredCount = 0;
  const mismatchUnits = [], expiredUnits = [];
  units.forEach(no => {
    counts[state.units[phaseKey][no].status]++;
    if (isMismatch(phaseKey, no)) { mismatchCount++; mismatchUnits.push(no); }
    if (isExpiredPermit(phaseKey, no)) { expiredCount++; expiredUnits.push(no); }
  });
  return { counts, mismatchCount, expiredCount, mismatchUnits, expiredUnits, total: units.length };
}

function unitLabel(phaseKey, no) {
  const addr = PHASES[phaseKey].addressMap[no];
  return { lot: (addr && addr.lot) || no, address: (addr && addr.address) || "" };
}

function streetName(address) {
  const m = String(address).match(/Jalan M-Panora \d+\/\d+/);
  return m ? m[0] : "Other";
}

function houseNumber(address) {
  return String(address).split(",")[0].trim();
}

function streetSortKey(street) {
  const m = street.match(/(\d+)\/(\d+)/);
  if (!m) return [99, 99];
  return [parseInt(m[1]), parseInt(m[2])];
}

function renderUnitCard(phaseKey, no, isAll) {
  const u = state.units[phaseKey][no];
  const def = STATUS_DEFS[u.status];
  const { lot, address } = unitLabel(phaseKey, no);
  const mismatch = isMismatch(phaseKey, no);
  const expired = isExpiredPermit(phaseKey, no);
  return `
    <div class="unit-card ${def.cls}${expired ? ' expired-permit' : ''}" data-phase="${phaseKey}" data-unit="${no}">
      ${mismatch ? '<span class="uflag" title="Renovation flagged without VP on record"></span>' : ''}
      ${expired ? '<span class="uflag expired" title="Renovation permit expired"></span>' : ''}
      ${isAll ? `<div class="uphase">${PHASES[phaseKey].label}</div>` : ''}
      <div class="uaddr">${address}</div>
      <div class="uno">P-${lot}</div>
      <div class="ustatus">${expired ? `Work Permit Expired on ${formatPermitDate(u.permitExpiry)}` : `${def.short}${u.status === 'renovation' && u.permitExpiry ? ` · til ${formatPermitDate(u.permitExpiry)}` : ''}`}</div>
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  const tab = state.activeTab;
  const isAll = tab === "all";
  const activePhases = isAll ? PHASE_KEYS : [tab];

  let combined = { counts: { vacant: 0, vp: 0, renovation: 0, movein: 0 }, mismatchCount: 0, expiredCount: 0, mismatchUnits: [], expiredUnits: [], total: 0 };
  const perPhase = {};
  activePhases.forEach(pk => {
    const c = computeCounts(pk);
    perPhase[pk] = c;
    combined.counts.vacant += c.counts.vacant;
    combined.counts.vp += c.counts.vp;
    combined.counts.renovation += c.counts.renovation;
    combined.counts.movein += c.counts.movein;
    combined.mismatchCount += c.mismatchCount;
    combined.expiredCount += c.expiredCount;
    combined.mismatchUnits.push(...c.mismatchUnits.map(no => ({ phaseKey: pk, no })));
    combined.expiredUnits.push(...c.expiredUnits.map(no => ({ phaseKey: pk, no })));
    combined.total += c.total;
  });

  let cards = [];
  activePhases.forEach(pk => {
    unitList(pk).forEach(no => cards.push({ phaseKey: pk, no }));
  });
  cards = cards.filter(({ phaseKey, no }) => {
    const u = state.units[phaseKey][no];
    if (state.filter !== "all" && u.status !== state.filter) return false;
    const term = state.search.trim().toLowerCase();
    if (term) {
      const { address } = unitLabel(phaseKey, no);
      const houseNo = houseNumber(address).toLowerCase();
      if (houseNo !== term) return false;
    }
    return true;
  });

  const pageTitle = isAll ? "M Panora — All Phases" : PHASES[tab].title;

  app.innerHTML = `
    <div class="masthead">
      <div class="masthead-left">
        <span class="app-title">GatekeeperGo</span>
        <span class="app-sub">M Panora Unit Status Tracker</span>
      </div>
      <div class="masthead-right">
        ${state.isAdmin ? `<button class="setup-btn" id="setupBtn">Manage in-house list</button>` : ''}
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${tab === 'all' ? 'active' : ''}" data-tab="all">ALL</button>
      ${PHASE_KEYS.map(pk => `<button class="tab-btn ${tab === pk ? 'active' : ''}" data-tab="${pk}">${PHASES[pk].label}</button>`).join("")}
      <button class="tab-btn admin-tab-btn ${state.isAdmin ? 'admin-active' : ''}" id="adminBtn">${state.isAdmin ? 'Admin: Logout' : 'Admin Login'}</button>
    </div>

    <div class="alert-banner ${combined.mismatchCount > 0 ? 'show' : ''}">
      <span><b>${combined.mismatchCount} unit${combined.mismatchCount === 1 ? '' : 's'}</b> marked under renovation with no VP recorded in history: ${combined.mismatchUnits.map(({phaseKey, no}) => { const l = unitLabel(phaseKey, no); return `${isAll ? PHASES[phaseKey].label + ' ' : ''}P-${l.lot} (${l.address})`; }).join(", ") || "—"}. Confirm before allowing contractor access.</span>
    </div>

    <div class="alert-banner expired-banner ${combined.expiredCount > 0 ? 'show' : ''}">
      <span><b>${combined.expiredCount} unit${combined.expiredCount === 1 ? '' : 's'}</b> have an expired renovation permit: ${combined.expiredUnits.map(({phaseKey, no}) => { const l = unitLabel(phaseKey, no); return `${isAll ? PHASES[phaseKey].label + ' ' : ''}P-${l.lot} (${l.address})`; }).join(", ") || "—"}. Contractors should not be working on these units until the permit is renewed.</span>
    </div>

    <div class="header">
      <div>
        <h1>${pageTitle}</h1>
        <p>${combined.total} units</p>
      </div>
    </div>

    <div class="stats ${isAll ? 'stats-5' : ''}">
      ${isAll ? `<div class="stat-card"><div class="stat-num">${combined.total}</div><div class="stat-label">Total units (both phases)</div></div>` : ''}
      <div class="stat-card stat-vp"><div class="stat-num">${combined.total - combined.counts.vacant}</div><div class="stat-label">Total VP issued (total − vacant)</div></div>
      <div class="stat-card stat-vacant"><div class="stat-num">${combined.counts.vacant}</div><div class="stat-label">Vacant Unit</div></div>
      <div class="stat-card stat-renovation"><div class="stat-num">${combined.counts.renovation}</div><div class="stat-label">Renovation Unit</div></div>
      <div class="stat-card stat-movein"><div class="stat-num">${combined.counts.movein}</div><div class="stat-label">Move-in Unit</div></div>
    </div>

    <div class="filter-group">
      <div class="filter-group-title">Unit Status</div>
      <div class="filter-group-pills">
        <button class="filter-btn ${state.filter === 'all' ? 'active' : ''}" data-filter="all">All</button>
        <button class="filter-btn ${state.filter === 'vacant' ? 'active' : ''}" data-filter="vacant"><span class="dot" style="background:var(--vacant-600)"></span>Vacant Unit</button>
        <button class="filter-btn ${state.filter === 'vp' ? 'active' : ''}" data-filter="vp"><span class="dot" style="background:var(--vp-600)"></span>VP Unit</button>
        <button class="filter-btn ${state.filter === 'renovation' ? 'active' : ''}" data-filter="renovation"><span class="dot" style="background:var(--reno-600)"></span>Renovation Unit</button>
        <button class="filter-btn ${state.filter === 'movein' ? 'active' : ''}" data-filter="movein"><span class="dot" style="background:var(--movein-600)"></span>Move-in Unit</button>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search house number" value="${state.search}">
    </div>

    <div id="grid">
      ${cards.length === 0 ? '<div class="empty">No units match this search or filter.</div>' :
        state.search.trim() ? `
          <div class="street-group">
            <div class="street-group-header">
              <span>Search results <span class="street-group-count">${cards.length} unit${cards.length === 1 ? '' : 's'}</span></span>
            </div>
            <div class="grid">
              ${cards.map(({ phaseKey, no }) => renderUnitCard(phaseKey, no, isAll)).join("")}
            </div>
          </div>
        ` :
        (() => {
          const groups = {};
          cards.forEach(({ phaseKey, no }) => {
            const { address } = unitLabel(phaseKey, no);
            const street = streetName(address);
            if (!groups[street]) groups[street] = [];
            groups[street].push({ phaseKey, no });
          });
          const streetKeys = Object.keys(groups).sort((a, b) => {
            const ka = streetSortKey(a), kb = streetSortKey(b);
            return ka[0] - kb[0] || ka[1] - kb[1];
          });
          return streetKeys.map(street => {
            const streetCounts = { vacant: 0, vp: 0, renovation: 0, movein: 0 };
            groups[street].forEach(({ phaseKey, no }) => {
              streetCounts[state.units[phaseKey][no].status]++;
            });
            return `
            <div class="street-group">
              <div class="street-group-header">
                <span>${street} <span class="street-group-count">${groups[street].length} unit${groups[street].length === 1 ? '' : 's'}</span></span>
                <span class="street-group-breakdown">
                  <span class="sgb-item"><span class="sgb-dot" style="background:var(--vacant-600)"></span>${streetCounts.vacant} Vacant Unit</span>
                  <span class="sgb-item"><span class="sgb-dot" style="background:var(--vp-600)"></span>${streetCounts.vp} VP Unit</span>
                  <span class="sgb-item"><span class="sgb-dot" style="background:var(--reno-600)"></span>${streetCounts.renovation} Renovation Unit</span>
                  <span class="sgb-item"><span class="sgb-dot" style="background:var(--movein-600)"></span>${streetCounts.movein} Move-in Unit</span>
                </span>
              </div>
              <div class="grid">
                ${groups[street].map(({ phaseKey, no }) => renderUnitCard(phaseKey, no, isAll)).join("")}
              </div>
            </div>
          `;
          }).join("");
        })()
      }
    </div>

    <div class="overlay" id="unitOverlay">
      <div class="modal" id="unitModal"></div>
    </div>

    <div class="overlay" id="inhouseOverlay">
      <div class="modal" id="inhouseModal"></div>
    </div>
  `;

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeTab = btn.dataset.tab;
      state.filter = "all";
      state.search = "";
      render();
    });
  });
  document.getElementById("searchInput").addEventListener("input", e => {
    state.search = e.target.value;
    const cursorPos = e.target.selectionStart;
    render();
    const newInput = document.getElementById("searchInput");
    if (newInput) {
      newInput.focus();
      newInput.setSelectionRange(cursorPos, cursorPos);
    }
  });
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.filter = btn.dataset.filter;
      render();
    });
  });
  document.querySelectorAll(".unit-card").forEach(card => {
    card.addEventListener("click", () => {
      if (!state.isAdmin) {
        alert("Viewing only. Log in as admin to update unit status.");
        return;
      }
      openUnitModal(card.dataset.phase, card.dataset.unit);
    });
  });
  const setupBtnEl = document.getElementById("setupBtn");
  if (setupBtnEl) setupBtnEl.addEventListener("click", openInhouseModal);
  document.getElementById("adminBtn").addEventListener("click", () => {
    if (state.isAdmin) {
      state.isAdmin = false;
      render();
    } else {
      const entered = prompt("Enter admin password:");
      if (entered === null) return;
      if (entered === ADMIN_PASSWORD) {
        state.isAdmin = true;
        render();
      } else {
        alert("Incorrect password.");
      }
    }
  });
}

function openUnitModal(phaseKey, unitNo) {
  const u = state.units[phaseKey][unitNo];
  const overlay = document.getElementById("unitOverlay");
  const modal = document.getElementById("unitModal");
  const { lot, address } = unitLabel(phaseKey, unitNo);

  const inhouseOptions = state.inhouseList.length
    ? state.inhouseList.map(g => `<option value="${g}">${g}</option>`).join("")
    : `<option value="">No in-house staff set up yet</option>`;

  const historyHtml = (u.history || []).slice().reverse().slice(0, 10).map(h => `
    <div class="history-item">
      <div class="h-status">${STATUS_DEFS[h.status].label}${h.status === 'renovation' && h.permitExpiry ? ` · permit until ${formatPermitDate(h.permitExpiry)}` : ''}</div>
      ${h.status === 'renovation' && h.renovationNote ? `<div class="h-meta" style="font-style:italic;">"${h.renovationNote.replace(/</g, "&lt;")}"</div>` : ''}
      <div class="h-meta">${h.updatedBy || "Unknown"} · ${formatDate(h.updatedAt)}</div>
    </div>
  `).join("") || `<div class="history-item h-meta">No changes logged yet.</div>`;

  modal.innerHTML = `
    <button class="close-x" id="closeUnit">&times;</button>
    <h2>P-${lot}</h2>
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 8px;">
      ${PHASES[phaseKey].label}${address ? ` · ${address}` : ''}<br>
      Current status: <b>${STATUS_DEFS[u.status].label}</b><br>
      Last updated: ${u.updatedAt ? formatDate(u.updatedAt) + " by " + (u.updatedBy || "—") : "Never"}
      ${u.status === 'renovation' && u.permitExpiry ? `<br>Permit valid until: <b>${formatPermitDate(u.permitExpiry)}</b>${isExpiredPermit(phaseKey, unitNo) ? ' <span style="color:var(--danger-600)">(expired)</span>' : ''}` : ''}
      ${u.status === 'renovation' && u.renovationNote ? `<br>Note: <i>${u.renovationNote.replace(/</g, "&lt;")}</i>` : ''}
    </p>

    <label for="statusSelect">Update status</label>
    <select id="statusSelect">
      ${Object.entries(STATUS_DEFS).map(([key, def]) =>
        `<option value="${key}" ${key === u.status ? "selected" : ""}>${def.label}</option>`
      ).join("")}
    </select>

    <div id="permitField" style="display:${u.status === 'renovation' ? 'block' : 'none'};">
      <label for="permitExpiry">Renovation permit valid until</label>
      <input type="date" id="permitExpiry" value="${u.permitExpiry || ''}">
      <label for="renovationNote">Notes on current status</label>
      <textarea id="renovationNote" rows="3" placeholder="e.g. Tiling in progress, expected completion next week">${u.renovationNote || ''}</textarea>
    </div>

    <label for="inhouseSelect">Updated by</label>
    <select id="inhouseSelect">
      <option value="">Select in-house…</option>
      ${inhouseOptions}
    </select>

    <div class="modal-actions">
      <button class="btn" id="cancelUnit">Cancel</button>
      <button class="btn primary" id="saveUnit">Save change</button>
    </div>

    <h2 style="margin-top:20px;font-size:13px;color:var(--text-secondary);">Recent history</h2>
    <div>${historyHtml}</div>
  `;

  overlay.classList.add("show");
  document.getElementById("statusSelect").addEventListener("change", e => {
    document.getElementById("permitField").style.display = e.target.value === "renovation" ? "block" : "none";
  });
  document.getElementById("closeUnit").addEventListener("click", () => overlay.classList.remove("show"));
  document.getElementById("cancelUnit").addEventListener("click", () => overlay.classList.remove("show"));
  document.getElementById("saveUnit").addEventListener("click", async () => {
    const newStatus = document.getElementById("statusSelect").value;
    const inhouseStaff = document.getElementById("inhouseSelect").value;
    const permitExpiry = newStatus === "renovation" ? document.getElementById("permitExpiry").value : "";
    const renovationNote = newStatus === "renovation" ? document.getElementById("renovationNote").value.trim() : "";
    if (!inhouseStaff) {
      alert("Please select which in-house staff is making this update.");
      return;
    }
    const saveBtn = document.getElementById("saveUnit");
    saveBtn.disabled = true;
    saveBtn.textContent = "Saving…";

    const now = new Date().toISOString();
    const previous = JSON.parse(JSON.stringify(u));
    u.status = newStatus;
    u.updatedBy = inhouseStaff;
    u.updatedAt = now;
    u.permitExpiry = permitExpiry;
    u.renovationNote = renovationNote;
    u.history = u.history || [];
    u.history.push({ status: newStatus, updatedBy: inhouseStaff, updatedAt: now, permitExpiry: permitExpiry || undefined, renovationNote: renovationNote || undefined });
    if (u.history.length > 20) u.history = u.history.slice(-20);

    const ok = await saveUnits(phaseKey);
    if (!ok) {
      state.units[phaseKey][unitNo] = previous;
      saveBtn.disabled = false;
      saveBtn.textContent = "Save change";
      return;
    }
    overlay.classList.remove("show");
    render();
  });
}

function openInhouseModal() {
  const overlay = document.getElementById("inhouseOverlay");
  renderInhouseModal();
  overlay.classList.add("show");
}

function renderInhouseModal() {
  const modal = document.getElementById("inhouseModal");
  modal.innerHTML = `
    <button class="close-x" id="closeInhouse">&times;</button>
    <h2>In-house list</h2>
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 10px;">Add the names in-house staff will pick from when updating a unit. Shared across all phases.</p>
    <div id="inhouseRows">
      ${state.inhouseList.map((g, i) => `
        <div class="inhouse-row">
          <input type="text" value="${g}" data-idx="${i}" class="inhouseNameInput">
          <button data-idx="${i}" class="removeInhouseBtn">Remove</button>
        </div>
      `).join("")}
    </div>
    <button class="btn" id="addInhouseBtn" style="margin-top:8px;width:100%;">+ Add in-house staff</button>
    <div class="modal-actions">
      <button class="btn" id="closeInhouse2">Close</button>
      <button class="btn primary" id="saveInhouse">Save list</button>
    </div>
  `;

  document.getElementById("closeInhouse").addEventListener("click", () => document.getElementById("inhouseOverlay").classList.remove("show"));
  document.getElementById("closeInhouse2").addEventListener("click", () => document.getElementById("inhouseOverlay").classList.remove("show"));
  document.getElementById("addInhouseBtn").addEventListener("click", () => {
    state.inhouseList.push("");
    renderInhouseModal();
  });
  document.querySelectorAll(".removeInhouseBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.inhouseList.splice(parseInt(btn.dataset.idx), 1);
      renderInhouseModal();
    });
  });
  document.getElementById("saveInhouse").addEventListener("click", async () => {
    const saveBtn = document.getElementById("saveInhouse");
    const previous = JSON.parse(JSON.stringify(state.inhouseList));
    document.querySelectorAll(".inhouseNameInput").forEach(input => {
      state.inhouseList[parseInt(input.dataset.idx)] = input.value.trim();
    });
    state.inhouseList = state.inhouseList.filter(g => g.length > 0);

    saveBtn.disabled = true;
    saveBtn.textContent = "Saving…";
    const ok = await saveInhouse();
    if (!ok) {
      state.inhouseList = previous;
      saveBtn.disabled = false;
      saveBtn.textContent = "Save list";
      return;
    }
    document.getElementById("inhouseOverlay").classList.remove("show");
    render();
  });
}

(async function init() {
  await loadData();
  render();
})();
</script>

</body>
</html>
